# Required GitHub secrets (repository or environment):
#   AZURE_CREDENTIALS         — JSON output of `az ad sp create-for-rbac --sdk-auth` (clientId, clientSecret, subscriptionId, tenantId)
#   TF_BACKEND_RESOURCE_GROUP — RG containing the Terraform state storage account
#   TF_BACKEND_STORAGE_ACCOUNT
#   TF_BACKEND_CONTAINER
#
# Optional repository variable:
#   TF_ENVIRONMENT — default workspace name for state key and TF_VAR_environment (e.g. dev). Ignored when using workflow_dispatch.
#
# Azure RBAC for the SAME app registration as AZURE_CREDENTIALS (clientId):
#   • Subscription (or target RG): Contributor (or a custom role) so Terraform can manage resources.
#   • State storage account: **Storage Blob Data Contributor** (data plane). Required for use_azuread_auth.
#     Owner/Contributor on the subscription or RG does NOT include blob data access; without the blob role,
#     terraform init fails with 403 AuthorizationPermissionMismatch on ListBlobs.
#   • Assign the role at the storage account scope (or the blob container). Propagation can take a few minutes.
# Example (replace IDs/names): az role assignment create --assignee <clientId> --role "Storage Blob Data Contributor" \
#   --scope "$(az storage account show -g <rg> -n <storageAccount> --query id -o tsv)"
#
# Terraform azurerm backend does not use Azure CLI auth for service principals; the workflow exports ARM_* from AZURE_CREDENTIALS.

name: Terraform

on:
  pull_request:
    paths:
      - "**/*.tf"
      - ".terraform.lock.hcl"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - ".terraform.lock.hcl"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "TF_VAR_environment and state key segment (e.g. dev, staging)."
        required: true
        default: dev
        type: string
      run_apply:
        description: "Run terraform apply after plan."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: true
  WORKING_DIRECTORY: .

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Export ARM credentials for Terraform
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          set -euo pipefail
          CID=$(echo "$AZURE_CREDENTIALS" | jq -r '.clientId // .appId // empty')
          SECRET=$(echo "$AZURE_CREDENTIALS" | jq -r '.clientSecret // empty')
          SUB=$(echo "$AZURE_CREDENTIALS" | jq -r '.subscriptionId // empty')
          TID=$(echo "$AZURE_CREDENTIALS" | jq -r '.tenantId // empty')
          if [ -z "$CID" ] || [ -z "$SECRET" ] || [ -z "$SUB" ] || [ -z "$TID" ]; then
            echo "::error::AZURE_CREDENTIALS must be JSON with clientId (or appId), clientSecret, subscriptionId, and tenantId."
            exit 1
          fi
          echo "ARM_CLIENT_ID=$CID" >> "$GITHUB_ENV"
          echo "ARM_SUBSCRIPTION_ID=$SUB" >> "$GITHUB_ENV"
          echo "ARM_TENANT_ID=$TID" >> "$GITHUB_ENV"
          {
            echo 'ARM_CLIENT_SECRET<<__TF_ARM_CLIENT_SECRET__'
            printf '%s\n' "$SECRET"
            echo __TF_ARM_CLIENT_SECRET__
          } >> "$GITHUB_ENV"
        # Delimiter form for ARM_CLIENT_SECRET avoids breakage if the secret contains = or quotes.

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Resolve Terraform environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tf_environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "tf_environment=${{ vars.TF_ENVIRONMENT || 'dev' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform format (check)
        run: terraform fmt -check -recursive

      - name: Write backend config
        env:
          TF_BACKEND_RG: ${{ secrets.TF_BACKEND_RESOURCE_GROUP }}
          TF_BACKEND_SA: ${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}
          TF_BACKEND_CONTAINER: ${{ secrets.TF_BACKEND_CONTAINER }}
        run: |
          set -euo pipefail
          for v in TF_BACKEND_RG TF_BACKEND_SA TF_BACKEND_CONTAINER; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Set repository secrets TF_BACKEND_RESOURCE_GROUP, TF_BACKEND_STORAGE_ACCOUNT, and TF_BACKEND_CONTAINER."
              exit 1
            fi
          done
          mkdir -p config
          cat > config/ci.backend.hcl <<EOF
          resource_group_name  = "${TF_BACKEND_RG}"
          storage_account_name = "${TF_BACKEND_SA}"
          container_name       = "${TF_BACKEND_CONTAINER}"
          key                  = "infocomp/${{ steps.env.outputs.tf_environment }}/terraform.tfstate"
          use_azuread_auth     = true
          EOF

      - name: Terraform init
        run: terraform init -input=false -backend-config=config/ci.backend.hcl

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        env:
          TF_VAR_environment: ${{ steps.env.outputs.tf_environment }}
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform show (plan text)
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: tfplan.txt

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && inputs.run_apply == true
        env:
          TF_VAR_environment: ${{ steps.env.outputs.tf_environment }}
        run: terraform apply -input=false -no-color tfplan
